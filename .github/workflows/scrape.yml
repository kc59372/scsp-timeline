name: Scheduled Scrape

# Runs the data-ingestion scrapers on a schedule and POSTs new entries to the
# deployed /api/ingest (they land as PENDING for admin review).
#
# Required repository secrets:
#   INGEST_URL       e.g. https://timeline.example.org/api/ingest
#   INGEST_TOKEN     must match the deployment's INGEST_TOKEN
#   SAM_GOV_API_KEY  free key from api.sam.gov (optional; sam_gov skips if unset)
#   CONGRESS_API_KEY free key from api.congress.gov (optional; congress_gov skips if unset)
#   DVIDS_API_KEY    public key from api.dvidshub.net (optional; dvids_gov skips if unset)
#
# All sources are official .mil/.gov (no commercial news). Events land PENDING
# and are grouped into program lifecycles by the admin review queue.

on:
  # WEEKLY SCHEDULE. Safe to run on a schedule now that the deployed app (main,
  # commit 4af221f onward) preserves a re-ingested event's entryStatus instead
  # of resetting it to PENDING — so a scrape no longer reverts admin approvals.
  # Note: GitHub cron is UTC and does NOT observe daylight saving, so 13:00 UTC
  # is 9am ET during EDT (Mar–Nov) and 8am ET during EST (Nov–Mar).
  schedule:
    - cron: "0 13 * * 5" # weekly, Fridays at 13:00 UTC (≈9am ET)
  workflow_dispatch: {} # also allow manual runs (from the Actions tab)

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      INGEST_URL: ${{ secrets.INGEST_URL }}
      INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
      SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
      CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
      DVIDS_API_KEY: ${{ secrets.DVIDS_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scrapers/requirements.txt

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run .mil/.gov scraper roster (backfill)
        # backfill.py runs every scraper; individual scrapers that lack an
        # optional API key exit non-zero and are reported but don't abort here.
        run: python scrapers/backfill.py --limit 200 || echo "one or more scrapers skipped/failed (continuing)"
